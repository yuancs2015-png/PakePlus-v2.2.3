<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <script>
            const currentProject = JSON.parse(
                localStorage.getItem('currentProject') || '{}'
            )
            let pwdList = ['pakeplus']
            // 先清空 localStorage
            // localStorage.clear()
            if (localStorage.getItem(currentProject.appid) === '1') {
                window.location.replace('https://www.pakeplus.com')
            }
        </script>
        <title>请输入密码</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            :root {
                /* 默认：深色（iOS Dark） */
                --bg: linear-gradient(135deg, #1c1c1e, #2c2c2e);
                --card-bg: rgba(255, 255, 255, 0.08);
                --text: #ffffff;
                --input-bg: rgba(255, 255, 255, 0.1);
                --input-focus: rgba(255, 255, 255, 0.15);
                --placeholder: rgba(255, 255, 255, 0.4);
                --border-focus: rgba(0, 122, 255, 0.6);
                --shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            }

            /* 白色主题 */
            .light {
                --bg: linear-gradient(135deg, #f2f2f7, #ffffff);
                --card-bg: rgba(255, 255, 255, 0.9);
                --text: #1c1c1e;
                --input-bg: rgba(0, 0, 0, 0.05);
                --input-focus: rgba(0, 0, 0, 0.08);
                --placeholder: rgba(0, 0, 0, 0.4);
                --border-focus: rgba(0, 122, 255, 0.6);
                --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            }

            body {
                height: 100vh;
                background: var(--bg);
                color: var(--text);
                /* display: none; */
                justify-content: center;
                align-items: center;
            }

            .card {
                width: 90%;
                max-width: 380px;
                padding: 30px 24px;
                text-align: center;
                animation: fadeIn 0.6s ease;
            }

            /* card glass */
            .cardShadow {
                width: 90%;
                max-width: 380px;
                padding: 30px 24px;
                text-align: center;
                animation: fadeIn 0.6s ease;
                border-radius: 28px;
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                background: var(--card-bg);
                box-shadow: var(--shadow);
            }

            /* 标题 */
            .title {
                font-size: 22px;
                font-weight: 600;
                margin-bottom: 24px;
            }
            /* 输入框 */
            .input {
                width: 100%;
                padding: 14px;
                border-radius: 14px;
                border: none;
                outline: none;
                font-size: 16px;
                margin-bottom: 16px;
                background: var(--input-bg);
                color: var(--text);
                transition: 0.2s;
            }
            .input::placeholder {
                color: var(--placeholder);
            }
            .input:focus {
                background: var(--input-focus);
                box-shadow: 0 0 0 2px var(--border-focus);
            }
            .tip {
                font-size: 14px;
                color: var(--text);
                opacity: 0.7;
                margin-top: 12px;
            }
            /* 按钮 */
            .button {
                width: 100%;
                padding: 14px;
                border-radius: 14px;
                border: none;
                font-size: 16px;
                font-weight: 500;
                background: linear-gradient(135deg, #0a84ff, #4facfe);
                color: #fff;
                cursor: pointer;
                transition: 0.2s;
            }
            .button:active {
                transform: scale(0.97);
            }
            /* 错误提示 */
            .error {
                /* margin-top: 12px; */
                font-size: 14px;
                color: #ff453a;
                opacity: 0;
                transition: 0.2s;
            }
            /* 适配 iPhone 底部安全区 */
            @supports (padding: max(0px)) {
                body {
                    padding-bottom: env(safe-area-inset-bottom);
                }
            }
        </style>
    </head>
    <body class="dark">
        <!-- 激活卡片 -->
        <div class="card" id="card">
            <div class="title" id="title">请输入密码</div>
            <input id="code" class="input" placeholder="请输入密码" />
            <button class="button" id="button" onclick="check()">验证</button>
            <div class="tip" id="tip">提示内容</div>
            <div id="error" class="error">密码错误</div>
        </div>
        <script>
            window.onload = () => {
                // 设置样式
                if (currentProject.desktop.pwdTheme === 'system') {
                    // document.body.classList.add('system')
                    const mediaQuery = window.matchMedia(
                        '(prefers-color-scheme: dark)'
                    )
                    if (mediaQuery) {
                        const listener = (e) => {
                            const newTheme = e.matches ? 'dark' : 'light'
                            document.body.classList.add(newTheme)
                        }
                        mediaQuery.addEventListener('change', listener)
                    }
                } else {
                    document.body.classList.add(currentProject.desktop.pwdTheme)
                }
                document.getElementById('card').classList =
                    currentProject.desktop.pwdStyle
                // 设置标题
                document.title = currentProject.desktop.pwdTitle
                document.getElementById('title').textContent =
                    currentProject.desktop.pwdTitle
                document.getElementById('code').placeholder =
                    currentProject.desktop.pwdPlace
                document.getElementById('tip').textContent =
                    currentProject.desktop.pwdTip
                document.getElementById('error').textContent =
                    currentProject.desktop.pwdError
                document.getElementById('button').textContent =
                    currentProject.desktop.pwdBtn
                // 设置密码列表
                pwdList.push(currentProject.desktop.startPwd)
            }
            function check() {
                const val = document.getElementById('code').value.trim()
                const error = document.getElementById('error')
                const card = document.getElementById('card')
                if (pwdList.includes(val)) {
                    if (currentProject.desktop.startMethod === 'oncePwd') {
                        localStorage.setItem(currentProject.appid, '1')
                    } else {
                        localStorage.setItem(currentProject.appid, '0')
                    }
                    showMain()
                } else {
                    error.style.opacity = 1
                }
            }
            // show main url
            function showMain() {
                window.location.replace('https://www.pakeplus.com')
            }
            document.body.style.display = 'flex'
        </script>
    </body>
</html>
